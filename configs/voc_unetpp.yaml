experiment_name: voc_unetpp
dataset:
  name: voc2012
  root: data
  train_split: train
  val_split: val
  num_classes: 21
  ignore_index: 255
  download: false
model:
  name: unetpp
  in_channels: 3
  channels: [64, 128, 256, 512, 1024]
  deep_supervision: false
training:
  seed: 42
  device: cuda
  amp: true
  epochs: 50
  batch_size: 4
  num_workers: 4
  image_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
augmentation:
  horizontal_flip: true
  color_jitter: true
profiling:
  warmup: 10
  iterations: 50
output:
  root: runs
